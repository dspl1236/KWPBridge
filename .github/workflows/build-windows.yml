name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyserial pyqt5 pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller kwpbridge.spec

      - name: Smoke test EXE exists and is runnable
        run: |
          dir dist\
          if not exist "dist\KWPBridge.exe" exit 1
        shell: cmd

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: KWPBridge-windows-${{ github.sha }}
          path: dist\KWPBridge.exe
          retention-days: 7

  release:
    needs: build-exe
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: KWPBridge-windows-${{ github.sha }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KWPBridge.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
